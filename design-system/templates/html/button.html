<!-- Component: Button / CTA — Quellnodigital -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button / CTA — Quellnodigital Design System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-brand-primary: #7C3AED;
      --color-brand-primary-dark: #5B21B6;
      --color-brand-primary-light: #A78BFA;
      --color-brand-secondary: #06B6D4;
      --color-accent: #F59E0B;
      --color-neutral-900: #0F0A1E;
      --color-neutral-800: #1E1433;
      --color-neutral-400: #9CA3AF;
      --color-neutral-300: #D1D5DB;
      --color-neutral-white: #FFFFFF;
      --gradient-cta: linear-gradient(135deg, #7C3AED 0%, #06B6D4 100%);
      --shadow-glow-primary: 0 0 40px rgba(124, 58, 237, 0.4);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --font: 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--color-neutral-900); color: white; padding: 60px 40px; }
    h2 { color: var(--color-neutral-400); font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
    .demo-section { margin-bottom: 48px; }
    .demo-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

    /* ─── BASE BUTTON ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: none; cursor: pointer; font-family: var(--font);
      font-weight: 600; text-decoration: none; white-space: nowrap;
      transition:
        transform 0.2s var(--ease-spring),
        box-shadow 0.2s ease,
        background 0.2s ease,
        opacity 0.2s ease;
      outline: none; position: relative; overflow: hidden;
    }
    .btn:focus-visible {
      outline: 2px solid var(--color-brand-primary-light);
      outline-offset: 3px;
    }
    .btn:active { transform: scale(0.97) !important; }
    .btn:disabled, .btn[aria-disabled="true"] {
      opacity: 0.4; cursor: not-allowed; pointer-events: none;
    }

    /* ─── SIZES ─── */
    .btn-sm  { padding: 8px 18px;  font-size: 0.8rem;  border-radius: 9999px; }
    .btn-md  { padding: 12px 28px; font-size: 0.9rem;  border-radius: 9999px; }
    .btn-lg  { padding: 16px 36px; font-size: 1rem;    border-radius: 9999px; }
    .btn-xl  { padding: 20px 48px; font-size: 1.125rem; border-radius: 9999px; }

    /* ─── VARIANTS ─── */
    /* Primary — gradient */
    .btn-primary {
      background: var(--gradient-cta); color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: var(--shadow-glow-primary);
    }
    /* Primary shine ripple */
    .btn-primary::after {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    .btn-primary:hover::after { left: 150%; }

    /* Secondary — outline */
    .btn-secondary {
      background: transparent; color: white;
      border: 1.5px solid rgba(124, 58, 237, 0.5);
      box-shadow: inset 0 0 0 0 var(--color-brand-primary);
    }
    .btn-secondary:hover {
      border-color: var(--color-brand-primary);
      background: rgba(124, 58, 237, 0.1);
      transform: translateY(-1px);
    }

    /* Ghost — text */
    .btn-ghost {
      background: transparent; color: var(--color-brand-primary-light);
      padding-left: 4px; padding-right: 4px; border-radius: 4px;
    }
    .btn-ghost::after {
      content: '';
      position: absolute; bottom: 6px; left: 4px; right: 4px; height: 1px;
      background: var(--color-brand-primary-light);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.2s ease;
    }
    .btn-ghost:hover::after { transform: scaleX(1); }

    /* Danger */
    .btn-danger {
      background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%);
      color: white;
    }
    .btn-danger:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
    }

    /* ─── WITH ICONS ─── */
    .btn svg { flex-shrink: 0; }

    /* ─── LOADING ─── */
    .btn-loading { pointer-events: none; }
    .spinner {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="demo-section">
    <h2>Variant</h2>
    <div class="demo-row">
      <button class="btn btn-primary btn-lg">Quero crescer previsível</button>
      <button class="btn btn-secondary btn-lg">Ver resultados</button>
      <button class="btn btn-ghost btn-lg">Saiba mais →</button>
      <button class="btn btn-danger btn-lg">Cancelar</button>
    </div>
  </div>

  <div class="demo-section">
    <h2>Size</h2>
    <div class="demo-row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary btn-md">Medium</button>
      <button class="btn btn-primary btn-lg">Large</button>
      <button class="btn btn-primary btn-xl">Extra Large</button>
    </div>
  </div>

  <div class="demo-section">
    <h2>With Icons</h2>
    <div class="demo-row">
      <button class="btn btn-primary btn-lg">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 13l4 4L19 7"/>
        </svg>
        Solicitar diagnóstico
      </button>
      <button class="btn btn-secondary btn-lg">
        Ver cases
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="demo-section">
    <h2>States</h2>
    <div class="demo-row">
      <button class="btn btn-primary btn-lg btn-loading">
        <span class="spinner"></span>
        Enviando...
      </button>
      <button class="btn btn-primary btn-lg" disabled>Desabilitado</button>
    </div>
  </div>

</body>
</html>
